name: winstar
description: "Ess"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 2.0.2+2

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  curved_navigation_bar: ^1.0.6
  provider: ^6.1.2
  flutter_svg: ^2.0.10+1
  pin_code_fields: ^8.0.1
  intl: ^0.19.0
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  dropdown_search: ^5.0.6
  flutter_settings_ui: ^3.0.1
  geocoding: ^3.0.0
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  location: ^7.0.0
  flutter_pdfview: ^1.3.2
  get: ^4.6.6
  connectivity_plus: ^6.1.0
  syncfusion_flutter_pdfviewer: ^27.1.58
  path_provider: ^2.1.5
  device_info_plus: ^10.1.2
  webview_flutter: ^4.10.0
  flutter_launcher_icons: ^0.14.1
  animate_do: ^3.3.4
  package_info_plus: ^8.1.1
  url_launcher: ^6.3.1
  multi_dropdown: ^3.0.1
  change_app_package_name: ^1.5.0
  unique_identifier: ^0.4.0
  mime: ^2.0.0
  firebase_core: ^4.4.0
    
dev_dependencies:
  flutter_test:
    sdk: flutter
 
  flutter_lints: ^3.0.0

flutter_launcher_icons:  
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/bindhaenlogo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/bindhaenlogo.png"
  
flutter:


  uses-material-design: true


  assets:
    - assets/icons/
    - assets/images/
    - assets/gifs/

